name: Elon Feed Analyzer

on:
  schedule:
    # Runs daily at 7:00 AM UTC (adjust to your timezone)
    # 7 AM UTC = ~2 AM EST / 11 PM PST (previous day)
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger anytime

permissions:
  contents: write
  pages: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and filter posts
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_elon_posts.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (git commit -m "Update Elon feed report - $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

      - name: Send push notification
        if: success()
        run: |
          POST_COUNT=$(python3 -c "import json; d=json.load(open('docs/posts.json')); print(len(d))")
          curl -s \
            -H "Title: Elon Feed Ready" \
            -H "Click: https://hardiksanghavi90-oss.github.io/Test/" \
            -H "Tags: chart_with_upwards_trend" \
            -H "Priority: default" \
            -d "${POST_COUNT} business insights from Elon Musk today. Tap to read." \
            ntfy.sh/${{ secrets.NTFY_TOPIC }} || true
